name: Build Windows Executable

on:
  push: 
    branches: ['main']
  workflow_dispatch: 

jobs: 
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Build Fat JAR with Maven
      run: ./mvnw clean package -DskipTests
    
    - name: Download Pinned Ollama Windows Engine
      run: |
        New-Item -ItemType Directory -Force -Path ai-engine
        $OllamaVersion = "v0.22.0"
        $DownloadUrl = "https://github.com/ollama/ollama/releases/download/$OllamaVersion/ollama-windows-amd64.zip"
        
        Invoke-WebRequest -Uri $DownloadUrl -OutFile "ollama.zip"
        Expand-Archive -Path "ollama.zip" -DestinationPath "ai-engine" -Force

    - name: Prepare Packaging Directory
      run: |
        New-Item -ItemType Directory -Force -Path assembly
        # Move the Spring Boot JAR
        Copy-Item -Path "target/springaidesktop-0.0.1-SNAPSHOT.jar" -Destination "assembly/"
        # Copy the Ollama engine folder so it sits next to the JAR
        Copy-Item -Path "ai-engine" -Destination "assembly/" -Recurse
    
    - name: Create Windows Executable with jpackage
      run: |
        New-Item -ItemType Directory -Force -Path jptemp

        jpackage `
          --type exe `
          --name Coltranic `
          --vendor "Coltran Enterprises" `
          --input assembly/ `
          --main-jar springaidesktop-0.0.1-SNAPSHOT.jar `
          --win-console `
          --license-file build-assets/terms-of-use.txt `
          --win-shortcut `
          --win-menu `
          --win-dir-chooser `
          --temp jptemp `
          --dest release/ 
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with: 
        name: Coltranic
        path: release/*.exe