name: Build Windows Executable

on:
  push: 
    branches: ['main']
  workflow_dispatch: 

jobs: 
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Build Fat JAR with Maven
      run: ./mvnw clean package -DskipTests
    
    - name: Download Pinned Ollama Windows Engine
      run: |
        New-Item -ItemType Directory -Force -Path ai-engine
        $OllamaVersion = "v0.22.0"
        $DownloadUrl = "https://github.com/ollama/ollama/releases/download/$OllamaVersion/ollama-windows-amd64.zip"
        
        Invoke-WebRequest -Uri $DownloadUrl -OutFile "ollama.zip"
        Expand-Archive -Path "ollama.zip" -DestinationPath "ai-engine" -Force

    - name: Build App Image
      run: |
        jpackage `
          --type app-image `
          --name Coltranic `
          --input target/ `
          --main-jar springaidesktop-0.0.1-SNAPSHOT.jar `
          --dest image-build/

    - name: Inject Ollama Engine into App Image
      run: |
        Copy-Item -Path "ai-engine" -Destination "image-build/Coltranic/app/" -Recurse -Force
    
    - name: Wrap App Image into Windows Executable
      run: |
        New-Item -ItemType Directory -Force -Path release
        jpackage `
          --type exe `
          --app-image image-build/Coltranic `
          --name Coltranic `
          --vendor "Coltran Enterprises" `
          --win-console `
          --license-file build-assets/terms-of-use.txt `
          --win-shortcut `
          --win-menu `
          --win-dir-chooser `
          --dest release/
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with: 
        name: Coltranic
        path: release/*.exe